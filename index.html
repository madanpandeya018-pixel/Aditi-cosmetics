<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditi Cosmetics Nepal | Full System Demo</title>

<style>
body{margin:0;font-family:sans-serif;background:#fff5f7}
header{background:#ff4d6d;color:#fff;padding:15px;text-align:center}
nav{background:#ff4d6d;display:flex;justify-content:center;gap:15px;padding:10px}
nav a{color:#fff;text-decoration:none}
section{padding:30px}
.hidden{display:none}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
.product{background:#fff;padding:10px;border-radius:10px;box-shadow:0 0 10px #ddd}
.product img{width:100%;height:180px;object-fit:cover}

button{background:#ff4d6d;color:#fff;border:none;padding:8px;cursor:pointer}

input,textarea{padding:8px;margin:5px;width:80%}

.cart{background:#fff;border:1px solid #ddd;padding:10px}

</style>
</head>

<body>

<header>
<h1>ADITI COSMETICS NEPAL</h1>
<p>Full Premium eCommerce Demo (All Phases in One File)</p>
</header>

<nav>
<a href="#" onclick="showPage('home')">Home</a>
<a href="#" onclick="showPage('shop')">Shop</a>
<a href="#" onclick="showPage('cart')">Cart</a>
<a href="#" onclick="showPage('login')">Login</a>
<a href="#" onclick="showPage('admin')">Admin</a>
</nav>

<!-- HOME -->
<section id="home">
<h2>Welcome to Aditi Cosmetics</h2>
<p>Premium beauty products in Nepal with offers and delivery.</p>
</section>

<!-- SHOP -->
<section id="shop" class="hidden">
<h2>Shop Products</h2>
<div class="products" id="productList"></div>
</section>

<!-- CART -->
<section id="cart" class="hidden">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<p>Total: Rs. <span id="total">0</span></p>
<button onclick="checkout()">Checkout</button>
</section>

<!-- LOGIN -->
<section id="login" class="hidden">
<h2>Login / Signup</h2>
<input id="username" placeholder="Username"><br>
<input id="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</section>

<!-- ADMIN -->
<section id="admin" class="hidden">
<h2>Admin Panel</h2>
<input id="pname" placeholder="Product Name"><br>
<input id="pprice" placeholder="Price"><br>
<button onclick="addProduct()">Add Product</button>
</section>

<script>

let products=[
{name:'Lipstick',price:500,img:'https://images.unsplash.com/photo-1585386959984-a41552231658'},
{name:'Perfume',price:2500,img:'https://images.unsplash.com/photo-1612817288484-6f916006741a'}
];

let cart=[];
let total=0;

function showPage(page){
document.querySelectorAll('section').forEach(s=>s.classList.add('hidden'));
document.getElementById(page).classList.remove('hidden');
}

function renderProducts(){
let html='';
products.forEach((p,i)=>{
html+=`<div class="product">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>Rs.${p.price}</p>
<button onclick="addToCart(${i})">Buy</button>
</div>`;
});
document.getElementById('productList').innerHTML=html;
}

function addToCart(i){
cart.push(products[i]);
total+=products[i].price;
renderCart();
}

function renderCart(){
let html='';
cart.forEach(p=>{
html+=`<p>${p.name} - Rs.${p.price}</p>`;
});
document.getElementById('cartItems').innerHTML=html;
document.getElementById('total').innerText=total;
}

function checkout(){
alert('Payment via eSewa/Khalti (Demo)');
}

function login(){
alert('Login system demo (no backend)');
}

function addProduct(){
let name=document.getElementById('pname').value;
let price=document.getElementById('pprice').value;
products.push({name:name,price:price,img:'https://via.placeholder.com/200'});
renderProducts();
alert('Product Added');
}

renderProducts();

</script>

</body>
</html>
