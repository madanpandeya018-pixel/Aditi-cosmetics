<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditi Cosmetics Nepal</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{background:#fff5f7}

/* HEADER */
header{
background:linear-gradient(90deg,#ff4d6d,#ff99ac);
color:#fff;padding:15px;
display:flex;justify-content:space-between;align-items:center
}
header h1{font-size:24px}

/* NAV */
nav{
display:flex;gap:20px
}
nav a{color:#fff;text-decoration:none;font-weight:bold}

/* MOBILE MENU */
.menu-toggle{
display:none;
font-size:25px;
cursor:pointer;
}

/* SEARCH */
.search{
padding:15px;text-align:center
}
.search input{
width:90%;max-width:500px;
padding:10px;border-radius:5px;border:1px solid #ccc
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;padding:20px
}

.product{
background:#fff;border-radius:10px;
box-shadow:0 0 10px #ddd;padding:10px;text-align:center
}

.product img{
width:100%;height:180px;object-fit:cover;border-radius:10px
}

.product button{
background:#ff4d6d;color:#fff;border:none;
padding:8px;margin-top:5px;cursor:pointer;border-radius:5px
}

/* OFFERS */
.offer{
background:#ffe6eb;text-align:center;padding:15px
}

/* CART */
.cart{
position:fixed;
right:0;top:0;
width:300px;height:100%;
background:#fff;
border-left:2px solid #ff4d6d;
padding:10px;
overflow:auto;
}

/* FOOTER */
footer{
background:#ff4d6d;color:#fff;text-align:center;padding:15px
}

/* TABLET */
@media(max-width:992px){
.products{
grid-template-columns:repeat(2,1fr);
}
}

/* MOBILE */
@media(max-width:600px){

nav{
display:none;
flex-direction:column;
background:#ff4d6d;
position:absolute;
top:60px;left:0;width:100%;
padding:10px;
}

nav.active{display:flex}

.menu-toggle{display:block}

.products{
grid-template-columns:1fr;
}

.cart{
width:100%;
height:250px;
top:auto;
bottom:0;
}

header h1{font-size:18px}
}
</style>
</head>

<body>

<header>
<h1>ADITI COSMETICS</h1>
<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<nav id="nav">
<a href="#">Home</a>
<a href="#products">Products</a>
<a href="#offers">Offers</a>
<a href="#contact">Contact</a>
</nav>
</header>

<div class="search">
<input type="text" id="search" placeholder="Search products...">
</div>

<div class="offer">
🔥 20% OFF | Free Delivery in Nepal | Buy 2 Get 1 Free
</div>

<section id="products">
<div class="products" id="productList">

<div class="product" data-name="lipstick">
<img src="https://images.unsplash.com/photo-1585386959984-a41552231658">
<h3>Lipstick</h3>
<p>Rs.500</p>
<button onclick="addToCart('Lipstick',500)">Add</button>
</div>

<div class="product" data-name="foundation">
<img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348">
<h3>Foundation</h3>
<p>Rs.1800</p>
<button onclick="addToCart('Foundation',1800)">Add</button>
</div>

<div class="product" data-name="perfume">
<img src="https://images.unsplash.com/photo-1612817288484-6f916006741a">
<h3>Perfume</h3>
<p>Rs.2500</p>
<button onclick="addToCart('Perfume',2500)">Add</button>
</div>

<div class="product" data-name="cream">
<img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
<h3>Face Cream</h3>
<p>Rs.1200</p>
<button onclick="addToCart('Cream',1200)">Add</button>
</div>

</div>
</section>

<!-- CART -->
<div class="cart">
<h3>🛒 Cart</h3>
<div id="cartItems"></div>
<p>Total: Rs. <span id="total">0</span></p>
<button onclick="checkout()">Checkout</button>
</div>

<!-- FEEDBACK -->
<section id="contact" style="padding:20px;text-align:center">
<h2>Feedback</h2>
<input id="name" placeholder="Name"><br><br>
<textarea id="msg" placeholder="Message"></textarea><br><br>
<button onclick="submitFeedback()">Submit</button>
<div id="reviews"></div>
</section>

<footer>
<p>Follow us: Facebook | Instagram | TikTok</p>
<p>© 2026 Aditi Cosmetics Nepal</p>
</footer>

<script>
let cart=[];
let total=0;

/* MENU */
function toggleMenu(){
document.getElementById("nav").classList.toggle("active");
}

/* CART */
function addToCart(name,price){
cart.push({name,price});
total+=price;
renderCart();
}

function renderCart(){
let html="";
cart.forEach(item=>{
html+=`<p>${item.name} - Rs.${item.price}</p>`;
});
document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
}

function checkout(){
if(cart.length==0){alert("Cart empty");return;}
alert("Order placed successfully!");
}

/* SEARCH */
document.getElementById("search").addEventListener("keyup",function(){
let value=this.value.toLowerCase();
document.querySelectorAll(".product").forEach(p=>{
p.style.display=p.dataset.name.includes(value)?"block":"none";
});
});

/* FEEDBACK */
function submitFeedback(){
let name=document.getElementById("name").value;
let msg=document.getElementById("msg").value;

if(!name||!msg){alert("Fill all fields");return;}

document.getElementById("reviews").innerHTML+=`<p><b>${name}</b>: ${msg}</p>`;
alert("Thanks!");
}
</script>

</body>
</html>
